services:

  db:
    image: postgres:16-alpine
    container_name: devices-db
    environment:
      POSTGRES_DB: devicesdb
      POSTGRES_USER: devices_user
      POSTGRES_PASSWORD: devices_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devices_user -d devicesdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: devices-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: devicesdb
      DB_USER: devices_user
      DB_PASSWORD: devices_pass
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
